services:
  - type: web
    name: gahoi-sarthi-api
    env: node
    plan: starter
    buildCommand: pnpm install && pnpm --filter backend build && pnpm prisma migrate deploy
    startCommand: node apps/backend/dist/index.js
    envVarGroups:
      - backend-secrets
    healthCheckPath: /health

  - type: cron
    name: match-worker
    env: node
    schedule: "0 20 * * *"
    buildCommand: pnpm install && pnpm --filter backend build
    startCommand: node apps/backend/dist/workers/match-worker.js

  - type: cron
    name: expiry-reminder
    env: node
    schedule: "0 4 * * *"
    buildCommand: pnpm install && pnpm --filter backend build
    startCommand: node apps/backend/dist/workers/expiry-reminder.js

  - type: cron
    name: weekly-digest
    env: node
    schedule: "0 3 * * 1"
    buildCommand: pnpm install && pnpm --filter backend build
    startCommand: node apps/backend/dist/workers/weekly-digest.js
